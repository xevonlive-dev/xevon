<html>
<head>
    <title>Iframe</title>
    <script src="../lib/jquery-2.0.3.min.js" type="text/javascript"></script>
    <script type="text/javascript">
function doLoad(textf){
	$('#content').html(textf);
}
    </script>
</head>
<body>
<p>This content is from the iframe.</p>

<a id="click-in-iframe-1" onclick="doLoad('some text from iframe')">load-c2</a>
<a id="click-in-iframe-2" onclick="doLoad('some other text from iframe')">load-c3</a>
<div id="content"></div>
<IFRAME id="nested" src="subiframe.html" width="400" height="500" scrolling="auto"
        frameborder="1">
</IFRAME>
</body>
</html>
