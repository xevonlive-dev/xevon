<html>
<head>
    <title>Iframe 2</title>
    <script src="../lib/jquery-2.0.3.min.js" type="text/javascript"></script>
    <script type="text/javascript">
function doLoad(textf){
	$('#content').html(textf);
}
    </script>
</head>
<body>
<p>This content is from iframe 2.</p>

<a href="javascript:void(0)" id="click-in-iframe2-1" onclick="doLoad('some text from iframe2')">load-c8</a>
<a href="javascript:void(0)" id="click-in-iframe2-2" onclick="doLoad('some new text from second iframe')">load-c9</a>

<IFRAME id="frame10" src="subiframe.html" width="400" height="500" scrolling="auto"
        frameborder="1">
</IFRAME>
<div id="content"></div>
</body>
</html>
