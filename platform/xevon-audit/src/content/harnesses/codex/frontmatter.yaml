format: toml
agent_name_prefix: "xevon-audit:"
dispatch_file: "agents-dispatch.md"
subagent_preamble_file: "subagent-preamble.md"
defaults:
  model: "gpt-5.4"
  model_reasoning_effort: "medium"
  sandbox_mode: "workspace-write"

subagent_defaults:
  model: "gpt-5.4"
  model_reasoning_effort: "medium"
  sandbox_mode: "workspace-write"

subagent_overrides:
  code-scanner:
    sandbox_mode: "danger-full-access"

# Agents absent from codex's current installed roster.
# Confirmation-mode agents are intentionally included for `--mode confirm`.
exclude:
  - independent-verifier
  - history-miner
  - assumption-breaker
  - deep-reviewer
