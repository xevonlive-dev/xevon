<!DOCTYPE html>
<html>
<head>
    <title>Iframe Content</title>
    <script type="text/javascript" src="../lib/jquery-2.0.3.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 10px; background: #f5f5f5; }
        button { margin: 5px; padding: 8px 16px; }
    </style>
    <script>
    $(function() {
        $("#iframe-gold").click(function() {
            $.get("iframe_gold_L1.html", function(data) { $('body').html(data); });
        });
        $("#iframe-trap").click(function() {
            $.get("iframe_trap.html", function(data) { $('body').html(data); });
        });
        $("#iframe-form").submit(function(e) {
            e.preventDefault();
            $.get("iframe_form_result.html", function(data) { $('body').html(data); });
        });
    });
    </script>
</head>
<body>
<h4>Iframe Content - Actions Inside Frame</h4>
<button id="iframe-gold" type="button">Iframe Gold Path (3 levels)</button>
<button id="iframe-trap" type="button">Iframe Trap Path</button>
<form id="iframe-form">
    <input type="text" name="iframe-input" placeholder="Iframe Input">
    <button type="submit">Submit in Iframe</button>
</form>
</body>
</html>
