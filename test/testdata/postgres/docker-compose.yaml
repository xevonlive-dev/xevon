services:
  postgres:
    image: postgres:16-alpine
    container_name: xevon-postgres-test
    environment:
      POSTGRES_USER: xevon_test
      POSTGRES_PASSWORD: xevon_test_pass
      POSTGRES_DB: xevon_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xevon_test -d xevon_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
