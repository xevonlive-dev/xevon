services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=security_vulnerability_examples
      - POSTGRES_USER=security_vulnerability_examples
      - POSTGRES_PASSWORD=security_vulnerability_examples
    ports:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U security_vulnerability_examples"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: https://github.com/upleveled/security-vulnerability-examples-next-js-postgres.git
    ports:
      - "3000:3000"
    environment:
      - PGHOST=db
      - PGDATABASE=security_vulnerability_examples
      - PGUSERNAME=security_vulnerability_examples
      - PGPASSWORD=security_vulnerability_examples
      - API_KEY=test-api-key-for-benchmark
    depends_on:
      db:
        condition: service_healthy
