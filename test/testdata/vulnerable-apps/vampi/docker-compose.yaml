services:
  vampi-secure:
    image: erev0s/vampi:latest
    container_name: vampi-secure
    ports:
      - "3005:5000"
    environment:
      - vulnerable=0
    restart: unless-stopped

  vampi-vulnerable:
    image: erev0s/vampi:latest
    container_name: vampi-vulnerable
    ports:
      - "3006:5000"
    environment:
      - vulnerable=1
    restart: unless-stopped
