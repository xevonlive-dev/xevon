version: 2

project_name: xevon
dist: dist

snapshot:
  version_template: "1.0.0"

before:
  hooks:
    - go mod tidy

builds:
  - id: xevon
    main: ./cmd/xevon
    binary: xevon
    env:
      - CGO_ENABLED=0
    flags:
      - -buildvcs=false
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.buildTime={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: xevon-archive
    builds:
      - xevon
    formats:
      - tar.gz
    name_template: "xevon_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

release:
  github:
    owner: xevon
    name: xevon
