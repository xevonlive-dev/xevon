<!DOCTYPE html>
<html>
<head>
    <title>File Upload Form Test</title>
</head>
<body>
    <h1>File Upload Form</h1>
    <p>A form with file upload using multipart/form-data encoding.</p>

    <form action="/form-result/upload" method="POST" enctype="multipart/form-data">
        <label for="description">Description:</label>
        <input type="text" id="description" name="description" value="My document">

        <label for="document">Select file:</label>
        <input type="file" id="document" name="document">

        <input type="submit" value="Upload">
    </form>
</body>
</html>
