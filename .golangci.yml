# golangci-lint v2 configuration.
# Conservative, high-signal linter set — kept green so `make lint` can gate CI.
version: "2"

run:
  # Lint test files too; several correctness bugs hide in fixtures/helpers.
  tests: true

linters:
  # "standard" = errcheck, govet, ineffassign, staticcheck, unused.
  default: standard
  enable:
    - misspell
    # errorlint: backlog cleared 2026-05 (the last 12 findings — errors.Is/As
    # conversions and %w fixes across deparos/input/notify — are fixed), so it
    # now gates CI green and prevents regressions (unchecked err ==/!=
    # comparisons, %v on wrapped errors, type-asserted errors).
    - errorlint
    # Additional linters evaluated 2026-05 and deferred because each needs a
    # bulk cleanup before it can gate CI green (kept off so `make lint` stays
    # green today):
    #   - gosec      : ~50 findings, mostly intentional for a security tool
    #                  (weak RNG for payloads, MD5/SHA1 for fingerprinting, the
    #                  documented InsecureSkipVerify sites). Needs per-site
    #                  //nolint rationale.
    #   - bodyclose  : 3 findings, all false positives — the ResponseChain
    #                  abstraction owns response-body lifecycle, invisible to
    #                  the linter. Do not enable without scoped exclusions.
  exclusions:
    # Keep golangci-lint's built-in sensible exclusions (e.g. generated files).
    generated: lax
    rules:
      # The rod package is vendored/generated browser-automation glue and is
      # already excluded from `go vet` in the Makefile/CI; don't lint it here.
      - path: pkg/spitolas/rod/
        linters:
          - errcheck
          - staticcheck
          - govet
          - ineffassign
          - unused
