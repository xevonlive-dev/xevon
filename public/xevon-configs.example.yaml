# ============================================================================
# Scope Configuration
# ============================================================================
# Controls which HTTP records are in scope for scanning.
# Each rule has include and exclude lists. All rules use AND logic:
# a record must pass every rule to be in scope. Exclude takes priority
# over include (if a record matches both, it is excluded).
#
# Pattern types vary by field:
#   host, path, content-type  — glob patterns (case-insensitive)
#   status_code               — exact ("200"), wildcard ("2xx", "2*"), range ("400-499")
#   request_string, response_string — case-insensitive substring match
#
# Defaults: include ["*"] and exclude [] for host, path, status_code,
# and content-types. String rules default to include [] (empty = match all).
#
# Manage at runtime with: xevon scope / xevon scope set
scope:
  # When true, scope rules are also enforced during ingestion: out-of-scope
  # requests are rejected before being saved to the database.
  # When false (default), all requests are saved but out-of-scope records
  # are skipped during scanning.
  applied_on_ingest: false

  # CLI origin mode restricts which hosts are in scope based on CLI target origins.
  # This provides automatic host restriction from the -t target URL(s).
  #
  # Modes (example target: http://www.example.com):
  #   "relaxed"  — host must contain the target's keyword (e.g. "example") (default);
  #                matches examplesite.com, test-example.net, etc.
  #   "all"      — no origin restriction
  #   "balanced" — host must share the target's eTLD+1 (e.g. example.com);
  #                matches *.example.com but not examplesite.com
  #   "strict"   — host must exactly match the target host;
  #                only www.example.com passes
  #
  # IP targets always use exact match regardless of mode.
  # Override with CLI flag: --scope-origin <mode>
  # Default: relaxed
  cli_origin_mode: relaxed

  # Maximum request body size in bytes. Bodies exceeding this limit are
  # handled according to body_size_exceeded_action.
  # 0 means unlimited. Default: 1048576 (1 MB)
  max_request_body_size: 1048576

  # Maximum response body size in bytes. Bodies exceeding this limit are
  # handled according to body_size_exceeded_action.
  # 0 means unlimited. Default: 524288000 (500 MB)
  max_response_body_size: 524288000

  # Action when body size exceeds the limit:
  #   "truncate"  — truncate body to the limit, save and scan (default)
  #   "drop"      — discard the item entirely (no save, no scan)
  #   "skip-scan" — save truncated body to DB but skip scanning modules
  body_size_exceeded_action: truncate

  # Automatically skip URLs whose path ends with a known static-asset
  # extension (images, fonts, video, audio, etc.).
  # This reduces noise and improves scan performance out of the box.
  # Default: true
  ignore_static_file: true

  # Categories of static file extensions to ignore when ignore_static_file
  # is enabled. Each key is a category name; values are lists of extensions
  # (case-insensitive, leading dot required). Add or remove entries to
  # customize which file types are skipped.
  ignore_static_content_type:
    fonts: [".ttf", ".otf", ".woff", ".woff2", ".eot", ".pfa", ".pfb", ".fnt", ".bdf", ".psf", ".snf", ".otc", ".ttc", ".afm", ".pfm"]
    images: [".jpg", ".jpeg", ".png", ".gif", ".bmp", ".tif", ".tiff", ".webp", ".avif", ".heic", ".heif", ".ico", ".cur", ".psd", ".raw", ".cr2", ".nef", ".arw", ".dng"]
    vector_images: [".ai", ".eps", ".cdr"]
    video: [".mp4", ".m4v", ".mov", ".avi", ".wmv", ".flv", ".webm", ".mkv", ".3gp", ".3g2", ".mpeg", ".mpg", ".m2ts", ".ogv", ".vob", ".rm", ".rmvb"]
    audio: [".mp3", ".wav", ".ogg", ".aac", ".flac", ".m4a", ".wma", ".mid", ".midi", ".amr", ".aiff"]

  # Host patterns (glob, case-insensitive)
  host:
    include:
      - "*"
    exclude: []
    # Example: scan only example.com and its subdomains, skip staging:
    # include:
    #   - "*.example.com"
    #   - "example.com"
    # exclude:
    #   - "staging.example.com"

  # URL path patterns (glob, case-insensitive)
  path:
    include:
      - "*"
    exclude: []
    # Example: scan only /api paths, skip health checks:
    # include:
    #   - "/api/*"
    # exclude:
    #   - "/api/health"
    #   - "/api/metrics"

  # HTTP status code filters
  # Supports exact ("200"), wildcard ("2xx"), and range ("400-499")
  status_code:
    include:
      - "*"
    exclude: []
    # Example: only scan responses with 2xx and 3xx status codes:
    # include:
    #   - "2xx"
    #   - "3xx"

  # Request Content-Type patterns (glob)
  request_content_type:
    include:
      - "*"
    exclude: []
    # Example: only scan JSON and form requests:
    # include:
    #   - "application/json*"
    #   - "application/x-www-form-urlencoded*"

  # Response Content-Type patterns (glob)
  response_content_type:
    include:
      - "*"
    exclude: []
    # Example: only scan HTML and JSON responses, skip images:
    # include:
    #   - "text/html*"
    #   - "application/json*"
    # exclude:
    #   - "image/*"

  # Request body/header substring match (case-insensitive)
  # Empty include = match all requests
  request_string:
    include: []
    exclude: []
    # Example: skip requests containing a specific auth token:
    # exclude:
    #   - "X-Internal-Service-Key"

  # Response body/header substring match (case-insensitive)
  # Empty include = match all responses
  response_string:
    include: []
    exclude: []
    # Example: skip responses containing "not found" boilerplate:
    # exclude:
    #   - "page not found"
    #   - "404 error"

# ============================================================================
# Content Discovery (Deparos)
# ============================================================================
# Configure deparos content discovery, which brute-forces directories and files
# on a target web server before vulnerability scanning begins.
# Managed by scanning_strategy; override with CLI flags: --discover, --discover-max-time
# Speed control (concurrency, max_duration) is configured in scanning_pace.discovery.
discovery:
  # Discovery mode: what types of resources to discover.
  # Options: "files_and_dirs", "files_only", "dirs_only"
  # Default: files_and_dirs
  mode: files_and_dirs

  # Scope mode for discovered URLs.
  # Options:
  #   "subdomain" - same registered domain (eTLD+1)
  #   "exact"     - exact hostname match only
  #   "any"       - no host restriction
  # Default: subdomain
  scope_mode: subdomain

  # Save HTTP response bodies from discovery into the ephemeral DB.
  # When true, response data is available for scanning modules.
  # Default: true
  save_response_body: true

  # Enrich discovery targets with paths from previous phases (spidering, external harvest).
  # When true, discovered paths are used to expand the brute-force target list.
  # When false, only the original seed URLs are used as discovery targets.
  # Default: false
  enrich_targets: false

  # Enable malformed path probing during directory discovery.
  # When true, uses the fuzz wordlist (fuzz_wordlist_path) to test directories
  # with path traversal and malformed path payloads (e.g., ..;/, .%00/, %2e%2e/).
  # Default: false
  enable_malformed_path_probe: false

  # Recursion settings for directory traversal.
  recursion:
    # Enable recursive directory discovery.
    # Default: true
    enabled: true

    # Maximum recursion depth (1-32767).
    # Default: 5
    max_depth: 5

  # Wordlist paths for discovery.
  # Empty path = wordlist disabled. Supports ~ expansion.
  wordlists:
    # short_file_path: ~/.xevon/wordlists/file-short.txt
    # long_file_path: ~/.xevon/wordlists/file-long.txt
    # short_dir_path: ~/.xevon/wordlists/dir-short.txt
    # long_dir_path: ~/.xevon/wordlists/dir-long.txt
    # fuzz_wordlist_path: ~/.xevon/wordlists/fuzz.txt

    # Use filenames observed during spidering as wordlist entries.
    # Default: true
    use_observed_names: true

    # Use observed directory paths as wordlist entries.
    # Default: true
    use_observed_paths: true

    # Test full observed filenames (e.g., "app.b5ca88ec.js").
    # Default: true
    use_observed_files: true

    # Enable numeric variant generation (e.g., page1 → page2, page3).
    # Default: false
    enable_numeric_fuzzing: false

  # File extension testing during discovery.
  extensions:
    # Test custom extensions (php, asp, aspx, jsp, etc.).
    # Default: true
    test_custom: true

    # Custom extension list (used when test_custom is true).
    # Default: deparos built-in list (php, asp, aspx, jsp, jspa, do)
    # custom_list:
    #   - php
    #   - asp
    #   - aspx

    # Test extensions observed during spidering.
    # Default: true
    test_observed: true

    # Test backup extensions (.bak, .old, .tmp, etc.).
    # Default: true
    test_backup_extensions: true

    # Custom backup extension list (used when test_backup_extensions is true).
    # Default: deparos built-in list (~1, $$$, bak, old, tmp, backup, etc.)
    # backup_extensions:
    #   - bak
    #   - old
    #   - tmp

    # Test files without extensions.
    # Default: true
    test_no_extension: true

  # Discovery engine settings.
  engine:
    # Case sensitivity mode for filename matching.
    # Options: "auto_detect", "sensitive", "insensitive"
    # Default: auto_detect
    case_sensitivity: auto_detect

    # HTTP request timeout per discovery request.
    # Must be 1s-300s.
    # Default: 10s
    timeout: 10s

    # Custom HTTP headers to include in all discovery requests.
    # custom_headers:
    #   Authorization: "Bearer my-token"
    #   X-Custom-Header: "value"

    # Enable cookie jar for session persistence during discovery.
    # Default: false
    enable_cookie_jar: false

    # Exit after N consecutive network errors (0 = disabled).
    # Default: 0
    max_consecutive_errors: 50

    # Exit after N consecutive WAF/CDN blocks (0 = disabled).
    # Default: 0
    max_consecutive_waf_blocks: 50

    # Max items per observed provider.
    # Default: 4000
    observed_max_items: 4000

    # Disable kingfisher secret scanning during discovery.
    # Default: true
    disable_kingfisher: true

# ============================================================================
# Browser-Based Spidering (Spitolas)
# ============================================================================
# Configure browser-based crawling to discover dynamic content, SPAs,
# and API endpoints that static crawlers miss. Uses headless Chromium
# to interact with pages (click elements, fill forms, trigger JS).
#
# Managed by scanning_strategy; override with CLI flags: --spider, --spider-max-time
# Speed control (max_duration) is configured in scanning_pace.spidering.
spidering:
  # Maximum crawl depth (0 = unlimited).
  # Default: 0
  max_depth: 0

  # Maximum number of unique states to discover (0 = unlimited).
  # Default: 0
  max_states: 0

  # Maximum duration for spidering per target.
  # Format: duration string (e.g., "30m", "1h")
  # Default: 30m
  max_duration: 30m

  # Maximum consecutive action failures before aborting.
  # Default: 100
  max_consecutive_fails: 100

  # Run browser in headless mode (no visible window).
  # Default: true
  headless: true

  # Number of concurrent browser instances.
  # More instances = faster crawling but higher resource usage.
  # Default: 1
  browser_count: 1

  # Crawl strategy for state exploration.
  # Options: "normal", "random", "oldest_first", "shallow_first", "adaptive"
  # Default: adaptive
  strategy: adaptive

  # Include HTTP response bodies in captured traffic.
  # Default: true
  include_response_body: true

  # Browser engine to use.
  # Options: "chromium" (default), "ungoogled" (Linux only)
  # Default: chromium
  browser_engine: chromium

  # Disable CDP (Chrome DevTools Protocol) event listener detection.
  # When false (default), the crawler uses CDP to detect click handlers
  # on elements. Set to true to disable this detection.
  # Default: false
  no_cdp: false

  # Disable automatic form filling during crawling.
  # When false (default), the crawler automatically fills and submits
  # forms it encounters. Set to true to skip form interactions.
  # Default: false
  no_forms: false

# ============================================================================
# Known Issue Scan
# ============================================================================
# Run nuclei templates against in-scope targets using the nuclei Go library.
# KnownIssueScan complements xevon's precision scanning with nuclei's broad template
# coverage for misconfigurations, exposures, and known CVEs.
#
# Managed by scanning_strategy; override with CLI flag: --known-issue-scan
# Speed control (concurrency, rate_limit, timeout) is configured in scanning_pace.known_issue_scan.
known_issue_scan:
  # Nuclei template tags to include (empty = all templates).
  # Default: [] (run all templates)
  tags: []
  # Example: run only specific tag categories:
  # tags:
  #   - cve
  #   - misconfig
  #   - exposure

  # Nuclei template tags to exclude.
  # Default: [dos]
  exclude_tags:
    - dos

  # Filter templates by severity (empty = all severities).
  # Options: critical, high, medium, low, info
  # Default: [critical, high] at the balanced intensity — high-signal only, which
  # keeps the phase within its time budget. (The deep intensity sweeps all five.)
  # Widen to the full sweep with:
  #   xevon config set known_issue_scan.severities "critical,high,medium,low,info"
  severities:
    - critical
    - high

  # Custom nuclei templates directory.
  # Leave empty to use the default nuclei-templates location.
  # Supports ~ expansion.
  # Default: "" (uses nuclei default templates)
  templates_dir: ""

  # Enrich known-issue-scan targets with paths discovered in previous phases.
  # When true, nuclei templates are run against individual path prefixes
  # found during discovery/spidering (increases coverage but can slow down scans).
  # When false, only host-level URLs are used as targets.
  # Default: true
  enrich_targets: false

# ============================================================================
# Pre-Scan External Intelligence Harvester
# ============================================================================
# Collects URLs from external intelligence sources before scanning.
# Discovered URLs are fed into the scan pipeline for vulnerability analysis.
# Managed by scanning_strategy; override with CLI flag: --external-harvest
# Timeout is configured in scanning_pace.external_harvester.max_duration.
external_harvester:
  # External sources to query for URLs.
  # Free sources (no API key): wayback, commoncrawl, alienvault
  # Keyed sources (require api_keys): urlscan, virustotal
  # Default: [wayback, commoncrawl, alienvault]
  sources:
    - wayback
    - commoncrawl
    - alienvault

  # API keys for external sources that require authentication.
  # Use ${ENV_VAR} syntax to read from environment variables.
  api_keys:
    urlscan: ${URLSCAN_API_KEY}
    virustotal: ${VIRUSTOTAL_API_KEY}

# ============================================================================
# AI Agent Integration
# ============================================================================
# Every agent invocation is routed through the in-process olium runtime —
# there are no external subprocess backends. Configure a provider below and
# olium handles the rest.
#
# Manage agent runs at runtime:
#   POST /api/agent/run/query      — single-shot prompt execution
#   POST /api/agent/run/autopilot  — autonomous scanning session
#   GET  /api/agent/status/list    — list all runs
#   GET  /api/agent/status/:id     — check a specific run
agent:
  # Stream agent output to stdout in real-time.
  # When true (default), agent message text appears incrementally as it is produced.
  # Set to false to buffer output and display only after the agent completes.
  # Only affects CLI mode; API/server mode is unaffected.
  # Default: true
  stream: true

  # Directory containing prompt template files (.md).
  # Templates are referenced by name (filename without extension)
  # via --prompt-template flag or API prompt_template field.
  # Subdirectories are searched recursively. Built-in templates are
  # organized into sast/ (code review) and analysis/ (scan input generation).
  # Supports ~ expansion.
  # Default: ~/.xevon/prompts/
  templates_dir: ~/.xevon/prompts/

  # Directory for agent run session artifacts (output.txt, extensions/, plan.json).
  # Each agent run creates a subdirectory under this path.
  # Supports ~ expansion.
  # Default: ~/.xevon/agent-sessions/
  sessions_dir: ~/.xevon/agent-sessions/

  # --------------------------------------------------------------------------
  # browser — agent-browser integration
  # --------------------------------------------------------------------------
  # Controls whether the agent can drive a real Chromium browser via the
  # `agent-browser` CLI. When enabled, autopilot and swarm seed the session
  # dir with skills/agent-browser/SKILL.md, the autopilot system prompt
  # gains a browser-usage section, and tools like `web_fetch(mode=browser)`
  # and `browser_probe` become reachable.
  #
  # Install once with: `npm i -g agent-browser && agent-browser install`
  # Verify with: `xevon doctor`
  browser:
    # Enable the browser surface. When false the agent still has HTTP fetches
    # via `web_fetch(mode=http)` but skips all browser-driven flows.
    # Default: true
    enable: true

    # Override the binary lookup. Empty resolves `agent-browser` on $PATH.
    # binary_path: /usr/local/bin/agent-browser

  # --------------------------------------------------------------------------
  # olium — native in-process agent
  # --------------------------------------------------------------------------
  # Settings for `xevon agent olium` AND the JavaScript extension agent
  # API (xevon.agent.chat / xevon.agent.analyze). Both run through
  # the same in-process engine with unified provider support.
  olium:
    # Provider to use. Vendor-first naming — the prefix tells you which
    # credential field below applies.
    # Options:
    #   openai-codex-oauth — ChatGPT Plus/Pro subscription via OAuth json (uses oauth_cred_path)
    #   openai-api-key     — OpenAI Chat Completions API (uses llm_api_key or $OPENAI_API_KEY)
    #   anthropic-api-key  — Anthropic Messages API (uses llm_api_key or $ANTHROPIC_API_KEY)
    #   anthropic-oauth    — Anthropic OAuth bearer token from `claude setup-token` (uses oauth_token or $ANTHROPIC_API_KEY)
    #   anthropic-cli      — Shells out to the local `claude` CLI (uses Claude Max sub; no key here)
    #   anthropic-vertex   — Claude on Google Vertex AI (uses oauth_cred_path + google_cloud_project/location)
    #   google-vertex      — Gemini on Google Vertex AI (same GCP creds as anthropic-vertex)
    #   openai-compatible  — Any OpenAI Chat Completions-compatible endpoint
    #                        (Ollama, OpenRouter, LM Studio, vLLM, Together,
    #                        Groq, LocalAI, custom proxies); configured under
    #                        `custom_provider` below.
    # Default: openai-compatible (local Ollama via custom_provider below)
    provider: openai-compatible

    # Model identifier. Empty = provider default.
    # Provider defaults: openai-codex-oauth → "gpt-5.5"; openai-api-key → "gpt-5.5";
    # anthropic-api-key → "claude-opus-4-7"; anthropic-oauth → "claude-opus-4-7";
    # anthropic-cli → "claude-opus-4-7"; anthropic-vertex → "claude-opus-4-6";
    # google-vertex → "gemini-2.5-pro"; openai-compatible → uses
    # `custom_provider.model_id` below.
    # Override per-run with --model.
    # Default: "" (empty). Leave empty so the provider default applies — for
    # openai-compatible that means custom_provider.model_id wins. Setting any
    # value here overrides custom_provider.model_id for every provider.
    model: ""

    # Path to OAuth/SA credential file. Supports ~ expansion.
    # openai-codex-oauth: ~/.codex/auth.json (produced by `codex login`)
    # anthropic-vertex / google-vertex: GCP service-account JSON
    #                    (falls back to $GOOGLE_APPLICATION_CREDENTIALS).
    # Default: ~/.codex/auth.json
    oauth_cred_path: ~/.codex/auth.json

    # Anthropic OAuth bearer token (anthropic-oauth provider). Produced by
    # `claude setup-token` — typically a `sk-ant-oat01-…` value. Supports
    # ${ENV_VAR} expansion at load time, e.g. `oauth_token: ${ANTHROPIC_API_KEY}`.
    # When empty the provider falls back to $ANTHROPIC_API_KEY (which is the
    # variable `claude setup-token` instructs you to export).
    # IMPORTANT: Never commit OAuth tokens to git — prefer the env-var form.
    # Default: ""
    oauth_token: ""

    # API key for key-based providers (anthropic-api-key, openai-api-key).
    # Supports ${ENV_VAR} expansion at load time, e.g. `llm_api_key: ${ANTHROPIC_API_KEY}`.
    # When empty the provider falls back to its conventional env var
    # (ANTHROPIC_API_KEY / OPENAI_API_KEY).
    # IMPORTANT: Never commit API keys to git — prefer the env-var form.
    # Default: ""
    llm_api_key: ""

    # Reasoning effort for providers that expose it (codex today).
    # Options: minimal | low | medium | high | xhigh
    # Default: medium
    reasoning_effort: medium

    # Optional system prompt override. Empty = built-in olium prompt.
    system_prompt: ""

    # Maximum tokens in the model response.
    # Default: 1000000
    max_tokens: 1000000

    # Sampling temperature (0.0 = deterministic, 1.0 = creative).
    # Default: 0.0
    temperature: 0.0

    # Hard ceiling on tool-loop iterations per user prompt for short
    # non-autopilot engine uses (swarm phases, source analysis, query).
    # Autopilot does NOT use this — its ceiling is set by --max-commands
    # (CLI) / MaxCommands (API), defaulting to 100, capped internally by
    # pkg/olium/autopilot.DefaultAutopilotMaxTurns (200) when both are 0.
    # Default: 32
    max_turns: 32

    # LRU cache size for identical prompts. 0 disables caching.
    # Default: 1024
    cache_size: 1024

    # Global cap on simultaneous in-flight provider calls. 0 disables the
    # cap (unbounded — only sensible when the upstream provider has no
    # rate limit). Tightens 429 risk on tier-1 API plans.
    # Default: 4
    max_concurrent: 4

    # Per-call deadline in seconds. A hung provider stream can't pin the
    # whole phase past this. Negative = inherit only the parent context
    # (no enforced timeout).
    # Default: 600 (10 minutes)
    call_timeout_sec: 600

    # --------------------------------------------------------------------------
    # custom_provider — settings for provider: openai-compatible
    # --------------------------------------------------------------------------
    # Only consulted when provider is set to "openai-compatible". Speaks the
    # OpenAI Chat Completions wire format, so any backend that does too works:
    # Ollama, OpenRouter, LM Studio, vLLM, Together, Groq, LocalAI, or your
    # own proxy.
    #
    # Examples:
    #   Ollama (local, no auth):    base_url: http://localhost:11434/v1
    #   LM Studio (local, no auth): base_url: http://localhost:1234/v1
    #   OpenRouter:                 base_url: https://openrouter.ai/api/v1
    #   Together:                   base_url: https://api.together.xyz/v1
    #   Groq:                       base_url: https://api.groq.com/openai/v1
    #
    # IMPORTANT: tool-calling depends on the model, not just the endpoint.
    # gemma4, qwen2.5-coder, llama3.1-instruct, mistral-nemo handle OpenAI-style
    # function tools well. Smaller models often ignore them and reply in
    # prose — if the agent never calls tools, switch to a tool-trained model.
    custom_provider:
      # Endpoint URL. Either the /v1 root or the full /v1/chat/completions
      # path works — the provider appends /chat/completions when needed.
      base_url: http://localhost:11434/v1

      # Default model id. Used when olium.model is empty and --model is not
      # passed. Examples: "gemma4:latest" (Ollama, default below),
      # "qwen2.5-coder:32b" (Ollama), "anthropic/claude-sonnet-4.6" (OpenRouter),
      # "meta-llama/Llama-3.1-70B-Instruct-Turbo" (Together).
      model_id: gemma4:latest

      # API key. Optional — empty disables the Authorization header entirely
      # (required for unauthenticated local servers like Ollama). Supports
      # ${ENV_VAR} expansion: api_key: ${OPENROUTER_API_KEY}.
      api_key: ""

      # Extra headers applied to every request, after the standard ones, so
      # they can override Authorization (handy for backends that use a
      # non-Bearer scheme). Each entry is a curl-style "Key: Value" string.
      # Mutate from the CLI with:
      #   xevon config set agent.olium.custom_provider.extra_headers.clear ""
      #   xevon config set agent.olium.custom_provider.extra_headers.add "X-Custom-Header: value"
      extra_headers: []
      #   - "X-Custom-Header: value"
      #   - "HTTP-Referer: https://your-site.example"   # OpenRouter ranking signal
      #   - "Authorization: Bearer ${MY_CUSTOM_TOKEN}"  # overrides default Bearer auth

  # --------------------------------------------------------------------------
  # xevon Audit Integration
  # --------------------------------------------------------------------------
  # Source security audit agent. When enabled and --source is provided,
  # swarm launches xevon-audit in the background, while autopilot runs
  # xevon-audit first and then starts the autonomous operator using the
  # prepared whitebox context.
  audit:
    # Enable xevon-audit integration.
    # Default: false
    enable: true

    # Path to xevon-audit harness directory.
    # Default: ~/.xevon/xevon-audit/
    # plugin_dir: ~/.xevon/xevon-audit/

    # Audit mode: "deep" (10-phase), "balanced" (6-phase), or "lite" (3-phase).
    # Default: balanced
    mode: balanced

    # The audit driver runs the `claude` or `codex` CLI. By default the
    # agent is resolved from `agent.olium.provider` (anthropic-* -> claude,
    # openai-* -> codex). Set `default_agent` to pin claude or codex
    # persistently without changing the olium provider (which still supplies
    # the BYOK auth) — a pure agent selector, same semantics as the per-run
    # `--agent` flag. Empty (the default) inherits the provider-derived
    # agent. Per-run `--agent`/`--provider` (CLI) and the request `agent`
    # field (REST) outrank this.
    #
    # Note: this only selects the agent — auth still follows the provider /
    # BYOK flags. Pairing default_agent with a mismatched provider (e.g.
    # default_agent: codex with an anthropic-* provider) forwards mismatched
    # creds; use a matching provider or pass per-run `--oauth-cred-file`
    # (codex) / `--api-key`. An impossible combo (codex + a claude-only
    # `--oauth-token`/anthropic-oauth) is rejected up front before any work.
    # Default: "" (inherit agent.olium.provider)
    default_agent: codex

    # Seconds between state synchronization with the parent agent.
    # Default: 30
    sync_interval: 30

# ============================================================================
# Cloud Storage Configuration
# ============================================================================
# Object storage for source code upload/download and scan result archival.
# Uses S3-compatible API (minio-go) — supports GCS (HMAC), AWS S3, and MinIO.
#
# Source paths: --source gs://<project-uuid>/ugc/source-code.zip
# Result paths: <bucket>/<project-uuid>/native-scans/<scan-uuid>/results.tar.gz
#               <bucket>/<project-uuid>/agentic-scans/<run-uuid>/results.tar.gz
#
# REST API endpoints (all project-scoped via X-Project-UUID header):
#   POST /api/storage/upload-source   — upload source code archive
#   GET  /api/storage/source/:key     — download source code
#   GET  /api/storage/results/:uuid   — download scan result bundle
#   POST /api/storage/presign         — generate presigned upload/download URL
storage:
  # Enable cloud storage integration.
  # Default: false
  enabled: false

  # Storage driver/provider.
  # Options: "gcs" (Google Cloud Storage via HMAC), "s3" (AWS S3), "minio"
  # GCS and S3 use auto-detected endpoints; minio requires an explicit endpoint.
  # Default: gcs
  driver: gcs

  # Storage endpoint (auto-detected for gcs/s3).
  # GCS: storage.googleapis.com (default)
  # S3:  s3.amazonaws.com (default)
  # MinIO: your-minio-host:9000 (required)
  # endpoint: ""

  # Bucket name for all storage operations.
  # Objects are stored as: <bucket>/<project-uuid>/<path>
  bucket: ${XEVON_STORAGE_BUCKET_NAME}

  # Bucket region.
  # Default: asia-southeast1
  region: asia-southeast1

  # S3 access key (or GCS HMAC access key).
  # Use ${ENV_VAR} syntax to read from environment variables.
  # IMPORTANT: Never commit access keys to git!
  access_key: ${XEVON_STORAGE_ACCESS_KEY}

  # S3 secret key (or GCS HMAC secret key).
  secret_key: ${XEVON_STORAGE_SECRET_KEY}

  # Use HTTPS for storage connections.
  # Default: true
  use_ssl: true

  # Force path-style addressing (required for some MinIO setups).
  # Default: false
  # path_style: false
