# Example multi-session config for IDOR/BOLA testing
# Usage:
#   xevon scan https://app.com --auth-file ~/.xevon/sessions/idor-test.yaml
#   xevon scan https://app.com --auth-file idor-test   # bare name resolved against session_dir
#
# Environment variables are expanded: use ${VAR} syntax for secrets.

sessions:
  # Primary session: the "owner" of the resources being scanned.
  # Discovery and spidering phases use this session only.
  - name: admin
    role: primary
    headers:
      Cookie: "${ADMIN_SESSION_COOKIE}"
      # Authorization: "Bearer ${ADMIN_TOKEN}"

  # Compare session: a different user whose access is compared against the primary.
  # If this session can see the same data as the primary, it's an IDOR/BOLA issue.
  - name: regular_user
    role: compare
    headers:
      Cookie: "${USER_SESSION_COOKIE}"

  # Optional: unauthenticated session (no headers) to test public access
  # - name: unauthenticated
  #   role: compare
