id: security-secrets-rack-session-secret
language: ruby
severity: warning
message: "Security: hardcoded Rack session secret — if this value is a known default, attackers can forge session cookies"
note: "Rack session cookies are signed with this secret. A known/weak value lets attackers tamper with session data."
rule:
  any:
    - pattern: "use Rack::Session::Cookie, secret: $SECRET"
    - pattern: "use Rack::Session::Cookie, :secret => $SECRET"
constraints:
  SECRET:
    regex: "^['\"]"
