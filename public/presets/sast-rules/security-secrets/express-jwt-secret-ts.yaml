id: security-secrets-express-jwt-ts
language: typescript
severity: warning
message: "Security: hardcoded JWT signing secret — if this value is a known default, attackers can forge tokens"
note: "JWT secrets must be unique, high-entropy, and loaded from environment variables or a secrets manager. A known/weak secret lets attackers sign arbitrary tokens."
rule:
  any:
    - pattern: jwt.sign($PAYLOAD, $SECRET)
    - pattern: jwt.sign($PAYLOAD, $SECRET, $$$OPTS)
    - pattern: jwt.verify($TOKEN, $SECRET)
    - pattern: jwt.verify($TOKEN, $SECRET, $$$OPTS)
    - pattern: jsonwebtoken.sign($PAYLOAD, $SECRET)
    - pattern: jsonwebtoken.sign($PAYLOAD, $SECRET, $$$OPTS)
    - pattern: jsonwebtoken.verify($TOKEN, $SECRET)
    - pattern: jsonwebtoken.verify($TOKEN, $SECRET, $$$OPTS)
    - pattern: "{ secretOrKey: $SECRET }"
    - pattern: "{ secretOrKey: $SECRET, $$$REST }"
constraints:
  SECRET:
    regex: "^['\"`]"
