id: security-secrets-rails-secret-key-base
language: ruby
severity: warning
message: "Security: hardcoded Rails secret_key_base — if this value is a known default, attackers can forge sessions and signed cookies"
note: "Rails secret_key_base is used for all signed and encrypted cookies, including sessions. It must be unique per deployment and never committed to source control."
rule:
  any:
    - pattern: config.secret_key_base = $SECRET
    - pattern: "secret_key_base: $SECRET"
constraints:
  SECRET:
    regex: "^['\"]"
