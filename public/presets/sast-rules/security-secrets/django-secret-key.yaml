id: security-secrets-django-secret-key
language: python
severity: warning
message: "Security: hardcoded Django SECRET_KEY — if this value is a known default, attackers can forge sessions and CSRF tokens"
note: "Django's SECRET_KEY is used for session signing, CSRF tokens, and cryptographic signing. It must be unique per deployment and loaded from environment variables."
rule:
  any:
    - pattern: SECRET_KEY = $SECRET
constraints:
  SECRET:
    regex: "^['\"]"
