id: security-secrets-flask-secret-key
language: python
severity: warning
message: "Security: hardcoded Flask secret_key — if this value is a known default, attackers can forge session cookies"
note: "Flask's secret_key is used to sign session cookies. A known/weak secret lets attackers tamper with session data. Load from environment variables."
rule:
  any:
    - pattern: $APP.secret_key = $SECRET
    - pattern: $APP.config['SECRET_KEY'] = $SECRET
    - pattern: $APP.config["SECRET_KEY"] = $SECRET
constraints:
  SECRET:
    regex: "^['\"]"
