id: security-secrets-express-session-ts
language: typescript
severity: warning
message: "Security: hardcoded session/cookie secret — if this value is a known default, attackers can forge sessions"
note: "Session and cookie-signing secrets must be unique, high-entropy, and loaded from environment variables or a secrets manager."
rule:
  any:
    - pattern: "session({ secret: $SECRET })"
    - pattern: "session({ secret: $SECRET, $$$REST })"
    - pattern: cookieParser($SECRET)
    - pattern: "cookie-session({ secret: $SECRET })"
    - pattern: "cookie-session({ secret: $SECRET, $$$REST })"
    - pattern: "cookieSession({ secret: $SECRET })"
    - pattern: "cookieSession({ secret: $SECRET, $$$REST })"
constraints:
  SECRET:
    regex: "^['\"`]"
