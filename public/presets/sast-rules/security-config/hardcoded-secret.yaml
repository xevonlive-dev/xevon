id: security-config-hardcoded-secret-js
language: javascript
severity: error
message: "Security: potential hardcoded secret in variable '$NAME' — secrets must come from environment variables or a secrets manager"
note: "Hardcoded secrets in source code are exposed in version control history and client bundles. Use environment variables or a secrets manager (Vault, AWS Secrets Manager, etc.)."
rule:
  any:
    - pattern: const $NAME = $VALUE
    - pattern: let $NAME = $VALUE
    - pattern: var $NAME = $VALUE
constraints:
  NAME:
    regex: "(?i)(secret|api.?key|private.?key|signing.?key|auth.?token|password|credential|encryption.?key|hmac)"
  VALUE:
    regex: "^['\"`]"
