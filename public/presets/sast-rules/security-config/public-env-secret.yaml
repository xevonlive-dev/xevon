id: security-config-public-env-secret-js
language: javascript
severity: error
message: "Security: sensitive value in public environment variable — NEXT_PUBLIC_/VITE_/REACT_APP_ vars are embedded in client bundles"
note: "Environment variables with NEXT_PUBLIC_, VITE_, or REACT_APP_ prefix are inlined into the client-side JavaScript bundle at build time. Never put API secrets, database URLs, or signing keys in these variables."
rule:
  any:
    - pattern: process.env.$VAR
constraints:
  VAR:
    regex: "^(NEXT_PUBLIC_|VITE_|REACT_APP_).*(SECRET|KEY|PASSWORD|TOKEN|PRIVATE|CREDENTIAL|DATABASE|DB_|MONGO|REDIS|STRIPE_SK|SIGNING)"
