id: security-config-dev-mode-production
language: javascript
severity: warning
message: "Security: NODE_ENV set to development — development mode enables verbose errors, hot reload, and debug endpoints"
note: "Ensure NODE_ENV is set to 'production' in production deployments. Development mode exposes stack traces, enables debugging features, and reduces performance."
rule:
  any:
    - pattern: "NODE_ENV = \"development\""
    - pattern: "NODE_ENV = 'development'"
    - pattern: "NODE_ENV: \"development\""
    - pattern: "NODE_ENV: 'development'"
