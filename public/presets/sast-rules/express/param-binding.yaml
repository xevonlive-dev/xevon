id: express-param-binding
language: javascript
severity: info
message: "Route: PARAM $PARAMS"
rule:
  any:
    - pattern: $REQ.params.$PARAMS
    - pattern: $REQ.query.$PARAMS
    - pattern: $REQ.body.$PARAMS
    - pattern: $REQ.params[$PARAMS]
    - pattern: $REQ.query[$PARAMS]
    - pattern: $REQ.body[$PARAMS]
