id: security-auth-fallback-secret-js
language: javascript
severity: error
message: "Security: environment variable with hardcoded fallback — if the env var is unset, the fallback secret is used in production"
note: "Patterns like process.env.SECRET || 'default' mean that if the environment variable is missing in production, a weak/known fallback is used. Fail hard if secrets are missing."
rule:
  any:
    - pattern: process.env.$VAR || $FALLBACK
    - pattern: process.env.$VAR ?? $FALLBACK
constraints:
  VAR:
    regex: "(?i)(SECRET|KEY|TOKEN|PASSWORD|SIGNING|PRIVATE|AUTH|JWT|ENCRYPT|HMAC)"
  FALLBACK:
    regex: "^['\"`]"
