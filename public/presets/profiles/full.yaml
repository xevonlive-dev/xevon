# description: Full scan — deep discovery, spidering, enriched known-issue-scan targets, thorough dynamic-assessment (slow)
scanning_strategy:
  default_strategy: deep

scanning_pace:
  concurrency: 30
  rate_limit: 50
  max_per_host: 5
  discovery:
    concurrency: 30
    max_duration: 2h
  spidering:
    max_duration: 1h
  known_issue_scan:
    max_duration: 3h
    duration_factor: 3.0
  dynamic-assessment:
    concurrency: 30

discovery:
  mode: files_and_dirs
  scope_mode: subdomain
  save_response_body: true
  enable_malformed_path_probe: true
  enrich_targets: true
  expand_seed_parents: true
  recursion:
    enabled: true
    max_depth: 10
  wordlists:
    use_observed_names: true
    use_observed_paths: true
    use_observed_files: true
    enable_numeric_fuzzing: true
  extensions:
    test_custom: true
    test_observed: true
    test_backup_extensions: true
    test_no_extension: true
  engine:
    case_sensitivity: auto_detect
    timeout: 15s
    enable_cookie_jar: true
    max_consecutive_errors: 50
    max_consecutive_waf_blocks: 20
    observed_max_items: 10000
    disable_kingfisher: true

spidering:
  max_depth: 0
  max_states: 0
  max_duration: 1h
  max_consecutive_fails: 200
  headless: true
  browser_count: 2
  strategy: adaptive
  browser_engine: chromium

known_issue_scan:
  enrich_targets: true
  # Deep intensity: sweep every severity (the slower, exhaustive pass).
  severities:
    - critical
    - high
    - medium
    - low
    - info
  exclude_tags:
    - dos

dynamic-assessment:
  enabled_modules:
    active_modules:
      - all
    passive_modules:
      - all

mutation_strategy:
  default_modes:
    - append
    - replace
